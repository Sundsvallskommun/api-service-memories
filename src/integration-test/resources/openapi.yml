              schema:
                $ref: "#/components/schemas/Problem"
  /api-docs:
    get:
      tags:
        - API
      summary: OpenAPI
      operationId: getApiDocs
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema:
                type: string
      x-auth-type: None
      x-throttling-tier: Unlimited
      x-wso2-mutual-ssl: Optional
components:
  schemas:
    Direction:
      type: string
      enum:
        - ASC
        - DESC
    PublicationParameters:
      type: object
      description: Publication search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
            - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
            - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
              - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
            - ASC
        query:
          type: string
          description: Free text search query
          examples:
            - Drowning accident
    Problem:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
    ConstraintViolationProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        title:
          type: string
        detail:
          type: string
        causeAsProblem:
          $ref: "#/components/schemas/ThrowableProblem"
        instance:
          type: string
          format: uri
    ThrowableProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        causeAsProblem: { }
    Violation:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    PagedPublicationResponse:
      type: object
      description: Paged publication response
      properties:
        publications:
          type: array
          items:
            $ref: "#/components/schemas/Publication"
            readOnly: true
        _meta:
          $ref: "#/components/schemas/PagingAndSortingMetaData"
          readOnly: true
    PagingAndSortingMetaData:
      type: object
      description: PagingAndSortingMetaData model
      properties:
        page:
          type: integer
          format: int32
          description: Current page
          examples:
            - "5"
          readOnly: true
        limit:
          type: integer
          format: int32
          description: Displayed objects per page
          examples:
            - "20"
          readOnly: true
        count:
          type: integer
          format: int32
          description: Displayed objects on current page
          examples:
            - "13"
          readOnly: true
        totalRecords:
          type: integer
          format: int64
          description: Total amount of hits based on provided search parameters
          examples:
            - "98"
          readOnly: true
        totalPages:
          type: integer
          format: int32
          description: Total amount of pages based on provided search parameters
          examples:
            - "23"
          readOnly: true
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort by
            examples:
              - property
            readOnly: true
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
            - ASC
    Publication:
      type: object
      description: Publication model
      properties:
        publicationId:
          type: integer
          format: int32
          description: Publication ID
          examples:
            - "207"
        filename:
          type: string
          description: Original filename from archive
          examples:
            - F21051/1841-02-18_Alfwar och Skämt nr 8.xml
        publicationType:
          type: string
          description: Publication type (free text)
          examples:
            - ""
        date:
          type: string
          description: Publication date
          examples:
            - 1841-02-18
        periodicalTitle:
          type: string
          description: Periodical title (newspaper/magazine name)
          examples:
            - Alfwar och Skämt
        issueNumber:
          type: string
          description: Periodical issue number
          examples:
            - "8"
        pageNumber:
          type: string
          description: Periodical page number
          examples:
            - "3"
        publisherLocation:
          type: string
          description: Publisher location
          examples:
            - Sundsvall
        documentTitle:
          type: string
          description: Document title
          examples:
            - Page 3 Alfwar och Skämt nr 8 1841
        locationText:
          type: string
          description: Publication location (free-text fallback from P_OPLATS)
          examples:
            - Sundsvall
        location:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over locationText
            when set)
          examples:
            - Sundsvall
        comment:
          type: string
          description: Comment / description
          examples:
            - Newspaper issue from 1841
        thumbnailFilename:
          type: string
          description: Thumbnail file name
          examples:
            - PUBL.id_207_fil_liten.jpeg
        largeImageFilename:
          type: string
          description: Large image file name
          examples:
            - PUBL.id_207_fil_stor.jpeg
        ocrFilename:
          type: string
          description: OCR/text file name
          examples:
            - PUBL.id_207_fil_txt.xml
        xmltext:
          type: string
          description: Full OCR/XML text (only returned on detail lookup)
    PhotoParameters:
      type: object
      description: Photo search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
            - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
            - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
              - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
            - ASC
        query:
          type: string
          description: Free text search query
          examples:
            - Sundsvall
        objectType:
          type: string
          description: "Filter by object type. Use 'Foto' for photographs or 'F\xF6\
            rem\xE5l' for physical objects. Omit to return both."
          examples:
            - Foto
    Photo:
      type: object
      description: Photo model
      properties:
        photoId:
          type: integer
          format: int32
          description: Photo ID
          examples:
            - "1234"
        filename:
          type: string
          description: Original filename from archive
        accessionNumber:
          type: string
          description: Accession number
        referenceCode:
          type: string
          description: Reference code (negative number)
        inventoryNumber:
          type: string
          description: Inventory number (RAÄ-nr)
        earlierReference:
          type: string
          description: Earlier reference number
        documentTitle:
          type: string
          description: Document title / description
        subjectKeyword:
          type: string
          description: Subject keyword
        comment:
          type: string
          description: Comment / description
        earliest:
          type: string
          description: Earliest date of time period
          examples:
            - "1920"
        latest:
          type: string
          description: Latest date of time period
          examples:
            - "1925"
        observationDate:
          type: string
          description: Observation date
        locationText:
          type: string
          description: Indeterminable place (free-text fallback from F_OPLATS)
        location:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over locationText
            when set)
        storageLocation:
          type: string
          description: Storage location
        objectType:
          type: string
          description: Object type
          examples:
            - Foto
        colorMode:
          type: string
          description: Black & white / colour
        negativePositive:
          type: string
          description: Negative / positive
        transmissiveReflective:
          type: string
          description: Transmissive / reflective
        imageCarrier:
          type: string
          description: Image carrier
        material:
          type: string
          description: Material
        technique:
          type: string
          description: Technique
        function:
          type: string
          description: Function
        height:
          type: string
          description: Height (cm)
        width:
          type: string
          description: Width (cm)
        diameter:
          type: string
          description: Diameter
        framed:
          type: string
          description: Framed / mounted
        conditionCategory:
          type: string
          description: Condition category
        conditionAssessment:
          type: string
          description: Condition assessment
        observerName:
          type: string
          description: Observer name
        treatment:
          type: string
          description: Treatment / action taken
        treatmentDate:
          type: string
          description: Treatment date
        signature:
          type: string
          description: Signature
        rights:
          type: string
          description: Image rights
        restricted:
          type: string
          description: Restrictions (Yes/No)
        restrictionNote:
          type: string
          description: Restriction comment
        provenance:
          type: string
          description: Comment about creator/donor
        thumbnailFilename:
          type: string
          description: Thumbnail file name
        largeImageFilename:
          type: string
          description: Large image file name
    PagedPhotoResponse:
      type: object
      description: Paged photo response
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/Photo"
            readOnly: true
        _meta:
          $ref: "#/components/schemas/PagingAndSortingMetaData"
          readOnly: true
    FilmParameters:
      type: object
      description: Film search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
            - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
            - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
              - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
            - ASC
        query:
          type: string
          description: Free text search query
          examples:
            - midsummer
    Film:
      type: object
      description: Film model
      properties:
        filmId:
          type: integer
          format: int32
          description: Film ID
          examples:
            - "123"
        filename:
          type: string
          description: Filename
          examples:
            - film001.mp4
        objectFilePath:
          type: string
          description: Film object file path
          examples:
            - /path/to/file.mp4
        objectType:
          type: string
          description: Object type
          examples:
            - VIDEO
        date:
          type: string
          description: Date
          examples:
            - 1985-06-15
        documentTitle:
          type: string
          description: Document title
          examples:
            - Midsummer celebration in Sundsvall
        topographyId:
          type: integer
          format: int32
          description: Topography ID
          examples:
            - "1"
        locationText:
          type: string
          description: Film location (free-text fallback from FILM_OPLATS)
          examples:
            - Sundsvall
        location:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over locationText
            when set)
          examples:
            - Sundsvall
        organizationId:
          type: integer
          format: int32
          description: Film organization ID
          examples:
            - "1"
        subEntityId:
          type: integer
          format: int32
