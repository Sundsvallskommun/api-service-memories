  /{municipalityId}/films/{id}/stream:
    get:
      tags:
      - Films
      summary: Stream film for inline playback
      description: "Serves the film file with Content-Disposition: inline and Accept-Ranges:\
        \ bytes. Honours the Range request header to return 206 Partial Content for\
        \ browser seek support. Multi-range requests fall back to a 200 full-body\
        \ response."
      operationId: streamFilm
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: Range
        in: header
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: {}
        "206":
          description: Partial content
          content:
            application/octet-stream: {}
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "416":
