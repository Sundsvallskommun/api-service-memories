openapi: 3.1.0
info:
  title: api-service-memories
  contact: { }
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: "3.1"
servers:
  - url: http://localhost:50509
    description: Generated server url
tags:
  - name: Audio
    description: Audio search and file operations
  - name: Films
    description: Film search operations
  - name: Photos
    description: Photo search and file operations
  - name: Publications
    description: Publication search and file operations
paths:
  /{municipalityId}/publications:
    get:
      tags:
        - Publications
      summary: Search publications
      description: "Fulltext search across title, comment and OCR text; only published\
        \ publications are returned. XMLTEXT is excluded from the list response."
      operationId: searchPublications
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: parameters
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PublicationParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedPublicationResponse"
  /{municipalityId}/publications/{id}:
    get:
      tags:
        - Publications
      summary: Get publication by ID
      description: "Get a specific publication by its ID, including the full XMLTEXT\
        \ OCR content"
      operationId: getPublication
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/publications/{id}/file:
    get:
      tags:
        - Publications
      summary: Get publication file
      description: "Download a file associated with a publication by specifying the\
        \ variant (thumbnail = thumbnail preview, large = large image, text = OCR/text)"
      operationId: getPublicationFile
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: variant
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: { }
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/photos:
    get:
      tags:
        - Photos
      summary: Search photos
      description: Fulltext search across title and comment; only published photos
        are returned.
      operationId: searchPhotos
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: parameters
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PhotoParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedPhotoResponse"
  /{municipalityId}/photos/{id}:
    get:
      tags:
        - Photos
      summary: Get photo by ID
      description: Get a specific photo by its ID
      operationId: getPhoto
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
