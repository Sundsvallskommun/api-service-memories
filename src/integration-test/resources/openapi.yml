openapi: 3.1.0
info:
  title: api-service-memories
  contact: {}
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: "2.3"
servers:
- url: http://localhost:50509
  description: Generated server url
tags:
- name: Films
  description: Film search operations
- name: Photos
  description: Photo search and file operations
- name: Publications
  description: Publication search and file operations
paths:
  /{municipalityId}/publications:
    get:
      tags:
      - Publications
      summary: Search publications
      description: "Fulltext search across title, comment and OCR text; only published\
        \ publications are returned. XMLTEXT is excluded from the list response."
      operationId: searchPublications
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: parameters
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/PublicationParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedPublicationResponse"
  /{municipalityId}/publications/{id}:
    get:
      tags:
      - Publications
      summary: Get publication by ID
      description: "Get a specific publication by its ID, including the full XMLTEXT\
        \ OCR content"
      operationId: getPublication
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/publications/{id}/file:
    get:
      tags:
      - Publications
      summary: Get publication file
      description: "Download a file associated with a publication by specifying the\
        \ variant (liten = thumbnail preview, stor = large image, txt = OCR/text)"
      operationId: getPublicationFile
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: variant
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: {}
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/photos:
    get:
      tags:
      - Photos
      summary: Search photos
      description: Fulltext search across title and comment; only published photos
        are returned.
      operationId: searchPhotos
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: parameters
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/FotoParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedFotoResponse"
  /{municipalityId}/photos/{id}:
    get:
      tags:
      - Photos
      summary: Get photo by ID
      description: Get a specific photo by its ID
      operationId: getPhoto
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Foto"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/photos/{id}/file:
    get:
      tags:
      - Photos
      summary: Get photo file
      description: "Download a file associated with a photo by specifying the variant\
        \ (liten = thumbnail preview, stor = large image)"
      operationId: getPhotoFile
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: variant
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: {}
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/films:
    get:
      tags:
      - Films
      summary: Search films
      description: Search films by free text query across title and comment. Returns
        paginated results.
      operationId: searchFilms
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: parameters
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/FilmParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedFilmResponse"
  /{municipalityId}/films/{id}:
    get:
      tags:
      - Films
      summary: Get film by ID
      description: Get a specific film by its ID
      operationId: getFilm
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/films/{id}/file:
    get:
      tags:
      - Films
      summary: Get film file
      description: Download the file associated with a film
      operationId: getFilmFile
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: {}
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api-docs:
    get:
      tags:
      - API
      summary: OpenAPI
      operationId: getApiDocs
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema:
                type: string
      x-auth-type: None
      x-throttling-tier: Unlimited
      x-wso2-mutual-ssl: Optional
components:
  schemas:
    Direction:
      type: string
      enum:
      - ASC
      - DESC
    PublicationParameters:
      type: object
      description: Publication search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
          - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
          - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
            - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
          - ASC
        query:
          type: string
          description: Free text search query
          examples:
          - Drunkningsolycka
    Problem:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
    ConstraintViolationProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        title:
          type: string
        detail:
          type: string
        causeAsProblem:
          $ref: "#/components/schemas/ThrowableProblem"
        instance:
          type: string
          format: uri
    ThrowableProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        causeAsProblem: {}
    Violation:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    PagedPublicationResponse:
      type: object
      description: Paged publication response
      properties:
        publications:
          type: array
          items:
            $ref: "#/components/schemas/Publication"
            readOnly: true
        _meta:
          $ref: "#/components/schemas/PagingAndSortingMetaData"
          readOnly: true
    PagingAndSortingMetaData:
      type: object
      description: PagingAndSortingMetaData model
      properties:
        page:
          type: integer
          format: int32
          description: Current page
          examples:
          - "5"
          readOnly: true
        limit:
          type: integer
          format: int32
          description: Displayed objects per page
          examples:
          - "20"
          readOnly: true
        count:
          type: integer
          format: int32
          description: Displayed objects on current page
          examples:
          - "13"
          readOnly: true
        totalRecords:
          type: integer
          format: int64
          description: Total amount of hits based on provided search parameters
          examples:
          - "98"
          readOnly: true
        totalPages:
          type: integer
          format: int32
          description: Total amount of pages based on provided search parameters
          examples:
          - "23"
          readOnly: true
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort by
            examples:
            - property
            readOnly: true
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
          - ASC
    Publication:
      type: object
      description: Publication model
      properties:
        publId:
          type: integer
          format: int32
          description: Publication ID
          examples:
          - "207"
        filnamn:
          type: string
          description: Original filename from archive
          examples:
          - F21051/1841-02-18_Alfwar och Skämt nr 8.xml
        publiktyp:
          type: string
          description: Publication type (free text)
          examples:
          - ""
        datum:
          type: string
          description: Publication date
          examples:
          - 1841-02-18
        tidtitel:
          type: string
          description: Periodical title (newspaper/magazine name)
          examples:
          - Alfwar och Skämt
        tidnr:
          type: string
          description: Periodical issue number
          examples:
          - "8"
        tidsida:
          type: string
          description: Periodical page number
          examples:
          - "3"
        forlagOplats:
          type: string
          description: Publisher location
          examples:
          - Sundsvall
        doktitel:
          type: string
          description: Document title
          examples:
          - Sida 3 Alfwar och Skämt nr 8 1841
        pubOplats:
          type: string
          description: Publication location (free-text fallback from P_OPLATS)
          examples:
          - Sundsvall
        plats:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over pubOplats
            when set)
          examples:
          - Sundsvall
        kommentPubl:
          type: string
          description: Comment / description
          examples:
          - Tidningsnummer från 1841
        filLiten:
          type: string
          description: Thumbnail file name
          examples:
          - PUBL.id_207_fil_liten.jpeg
        filStor:
          type: string
          description: Large image file name
          examples:
          - PUBL.id_207_fil_stor.jpeg
        filTxt:
          type: string
          description: OCR/text file name
          examples:
          - PUBL.id_207_fil_txt.xml
        xmltext:
          type: string
          description: Full OCR/XML text (only returned on detail lookup)
    FotoParameters:
      type: object
      description: Photo search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
          - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
          - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
            - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
          - ASC
        query:
          type: string
          description: Free text search query
          examples:
          - Sundsvall
        objtyp:
          type: string
          description: Filter by OBJTYP. Use 'Foto' for photographs or 'Föremål' for
            physical objects. Omit to return both.
          examples:
          - Foto
    Foto:
      type: object
      description: Photo / Foto model
      properties:
        fotoId:
          type: integer
          format: int32
          description: Photo ID
          examples:
          - "1234"
        filnamn:
          type: string
          description: Original filename from archive
        accNr:
          type: string
          description: Accession number
        refKod:
          type: string
          description: Reference code (negative number)
        inventNr:
          type: string
          description: Inventory number (RAÄ-nr)
        tidigNr:
          type: string
          description: Earlier reference number
        doktitel:
          type: string
          description: Document title / description
        sakord:
          type: string
          description: Subject keyword
        kommentFf:
          type: string
          description: Comment / description
        tidig:
          type: string
          description: Earliest date of time period
          examples:
          - "1920"
        senast:
          type: string
          description: Latest date of time period
          examples:
          - "1925"
        obsdatum:
          type: string
          description: Observation date
        fotoOplats:
          type: string
          description: Indeterminable place (free-text fallback from F_OPLATS)
        plats:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over fotoOplats
            when set)
        forplats:
          type: string
          description: Storage location
        objtyp:
          type: string
          description: Object type
          examples:
          - Foto
        svvitfarg:
          type: string
          description: Black & white / colour
        negPos:
          type: string
          description: Negative / positive
        genPas:
          type: string
          description: Transmissive / reflective
        bildbar:
          type: string
          description: Image carrier
        material:
          type: string
          description: Material
        teknik:
          type: string
          description: Technique
        funktion:
          type: string
          description: Function
        hojd:
          type: string
          description: Height (cm)
        bredd:
          type: string
          description: Width (cm)
        diam:
          type: string
          description: Diameter
        ram:
          type: string
          description: Framed / mounted
        tillSkat:
          type: string
          description: Condition category
        tillstand:
          type: string
          description: Condition assessment
        obsnamn:
          type: string
          description: Observer name
        atgard:
          type: string
          description: Treatment / action taken
        atdDatum:
          type: string
          description: Treatment date
        sign:
          type: string
          description: Signature
        givRattigh:
          type: string
          description: Image rights
        givForbeh:
          type: string
          description: Restrictions (Yes/No)
        anvando:
          type: string
          description: Restriction comment
        kommentUpph:
          type: string
          description: Comment about creator/donor
        filLiten:
          type: string
          description: Thumbnail file name
        filStor:
          type: string
          description: Large image file name
    PagedFotoResponse:
      type: object
      description: Paged photo response
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/Foto"
            readOnly: true
        _meta:
          $ref: "#/components/schemas/PagingAndSortingMetaData"
          readOnly: true
    FilmParameters:
      type: object
      description: Film search parameters
      properties:
        page:
          type: integer
          format: int32
          default: 1
          description: Page number
          examples:
          - "1"
          minimum: 1
        limit:
          type: integer
          format: int32
          description: Result size per page. Maximum allowed value is dynamically
            configured
          examples:
          - "15"
          minimum: 1
        sortBy:
          type: array
          items:
            type: string
            description: The properties to sort on
            examples:
            - propertyName
        sortDirection:
          $ref: "#/components/schemas/Direction"
          description: The sort order direction
          examples:
          - ASC
        query:
          type: string
          description: Free text search query
          examples:
          - midsommar
    Film:
      type: object
      description: Film model
      properties:
        filmId:
          type: integer
          format: int32
          description: Film ID
          examples:
          - "123"
        filnamn:
          type: string
          description: Filename
          examples:
          - film001.mp4
        filmObjFil:
          type: string
          description: Film object file path
          examples:
          - /path/to/file.mp4
        objtyp:
          type: string
          description: Object type
          examples:
          - VIDEO
        datum:
          type: string
          description: Date
          examples:
          - 1985-06-15
        doktitel:
          type: string
          description: Document title
          examples:
          - Midsommarfirande i Sundsvall
        filmTId:
          type: integer
          format: int32
          description: Film type ID
          examples:
          - "1"
        filmOplats:
          type: string
          description: Film location (free-text fallback from FILM_OPLATS)
          examples:
          - Sundsvall
        plats:
          type: string
          description: Resolved place name from TOPOGRAFI (preferred over filmOplats
            when set)
          examples:
          - Sundsvall
        filmOId:
          type: integer
          format: int32
          description: Film organization ID
          examples:
          - "1"
        filmUEId:
          type: integer
          format: int32
          description: Film sub-entity ID
          examples:
          - "0"
        filmUId:
          type: integer
          format: int32
          description: Film unit ID
          examples:
          - "1"
        kommentFilm:
          type: string
          description: Comment
          examples:
          - En film om midsommarfirande
        filmMimeType:
          type: string
          description: MIME type
          examples:
          - video/mp4
        nodeId:
          type: integer
          format: int32
          description: Node ID
          examples:
          - "456"
        options:
          type: integer
          format: int32
          description: Options
          examples:
          - "0"
        deletedDate:
          type: string
          format: date
          description: Deleted date
          examples:
          - 2026-01-15
    PagedFilmResponse:
      type: object
      description: Paged film response
      properties:
        films:
          type: array
          items:
            $ref: "#/components/schemas/Film"
            readOnly: true
        _meta:
          $ref: "#/components/schemas/PagingAndSortingMetaData"
          readOnly: true
  securitySchemes: {}
