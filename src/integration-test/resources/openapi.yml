        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/photos/{id}/file:
    get:
      tags:
        - Photos
      summary: Get photo file
      description: "Download a file associated with a photo by specifying the variant\
        \ (thumbnail = thumbnail preview, large = large image)"
      operationId: getPhotoFile
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: variant
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: { }
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/films:
    get:
      tags:
        - Films
      summary: Search films
      description: Search films by free text query across title and comment. Returns
        paginated results.
      operationId: searchFilms
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: parameters
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FilmParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
