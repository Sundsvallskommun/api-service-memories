        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/films/{id}/file:
    get:
      tags:
        - Films
      summary: Get film file
      description: Download the file associated with a film
      operationId: getFilmFile
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: { }
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/audios:
    get:
      tags:
        - Audio
      summary: Search audio
      description: Search audio by free text query across title and comment. Returns
        paginated results.
      operationId: searchAudios
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: parameters
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AudioParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAudioResponse"
  /{municipalityId}/audios/{id}:
    get:
      tags:
        - Audio
      summary: Get audio by ID
      description: Get a specific audio record by its ID
      operationId: getAudio
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
