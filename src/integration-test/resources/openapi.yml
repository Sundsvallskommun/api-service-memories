openapi: 3.1.0
info:
  title: api-service-memories
  contact: { }
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: "2.0"
servers:
  - url: http://localhost:53767
    description: Generated server url
tags:
  - name: Films
    description: Film search operations
paths:
  /{municipalityId}/films:
    get:
      tags:
        - Films
      summary: Search films
      description: "Search films by free text query across title, filename, location,\
        \ comment and date"
      operationId: searchFilms
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Film"
  /{municipalityId}/films/{id}:
    get:
      tags:
        - Films
      summary: Get film by ID
      description: Get a specific film by its ID
      operationId: getFilm
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/films/{id}/file:
    get:
      tags:
        - Films
      summary: Get film file
      description: Download the file associated with a film
      operationId: getFilmFile
      parameters:
        - name: municipalityId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/octet-stream: { }
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api-docs:
    get:
      tags:
        - API
      summary: OpenAPI
      operationId: getApiDocs
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema:
                type: string
      x-auth-type: None
      x-throttling-tier: Unlimited
      x-wso2-mutual-ssl: Optional
components:
  schemas:
    Problem:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
    ConstraintViolationProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        title:
          type: string
        causeAsProblem:
          $ref: "#/components/schemas/ThrowableProblem"
        detail:
          type: string
        instance:
          type: string
          format: uri
    ThrowableProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        causeAsProblem: { }
    Violation:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    Film:
      type: object
      description: Film model
      properties:
        filmId:
          type: integer
          format: int32
          description: Film ID
          examples:
            - "123"
        filnamn:
          type: string
          description: Filename
          examples:
            - film001.mp4
        filmObjFil:
          type: string
          description: Film object file path
          examples:
            - /path/to/file.mp4
        objtyp:
          type: string
          description: Object type
          examples:
            - VIDEO
        datum:
          type: string
          description: Date
          examples:
            - 1985-06-15
        doktitel:
          type: string
          description: Document title
          examples:
            - Midsommarfirande i Sundsvall
        filmTId:
          type: integer
          format: int32
          description: Film type ID
          examples:
            - "1"
        filmOplats:
          type: string
          description: Film location
          examples:
            - Sundsvall
        filmOId:
          type: integer
          format: int32
          description: Film organization ID
          examples:
            - "1"
        filmUEId:
          type: integer
          format: int32
          description: Film sub-entity ID
          examples:
            - "0"
        filmUId:
          type: integer
          format: int32
          description: Film unit ID
          examples:
            - "1"
        kommentFilm:
          type: string
          description: Comment
          examples:
            - En film om midsommarfirande
        filmMimeType:
          type: string
          description: MIME type
          examples:
            - video/mp4
        nodeId:
          type: integer
          format: int32
          description: Node ID
          examples:
            - "456"
        options:
          type: integer
          format: int32
          description: Options
          examples:
            - "0"
        deletedDate:
          type: string
          format: date
          description: Deleted date
          examples:
            - 2026-01-15
  securitySchemes: { }
