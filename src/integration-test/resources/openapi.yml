                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedFilmResponse"
  /{municipalityId}/films/{id}:
    get:
      tags:
        - Films
      summary: Get film by ID
      description: Get a specific film by its ID
      operationId: getFilm
      parameters:
        - name: municipalityId
          in: path
          required: true
