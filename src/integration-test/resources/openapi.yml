openapi: 3.1.0
info:
  title: api-service-memories
  contact: {}
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: "3.4"
servers:
- url: http://localhost:57301
  description: Generated server url
tags:
- name: Audio
  description: Audio search and file operations
- name: Legal entity
  description: Legal entity (juridisk person) search and retrieval
- name: Texts
  description: Text search and file operations
- name: Films
  description: Film search operations
- name: Photos
  description: Photo search and file operations
- name: Publications
  description: Publication search and file operations
- name: Category
  description: Category (verksamhetskategori) lookup for search form dropdowns
paths:
  /{municipalityId}/texts:
    get:
      tags:
      - Texts
      summary: Search texts
      description: "Fulltext search across title, comment and OCR text; only published\
        \ texts are returned. XMLTEXT and mediaFiles are excluded from the list response."
      operationId: searchTexts
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: parameters
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/TextParameters"
      responses:
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTextResponse"
  /{municipalityId}/texts/{id}:
    get:
      tags:
      - Texts
      summary: Get text by ID
      description: "Get a specific text by its ID, including the full XMLTEXT content\
        \ and any extra media files (TEXT_MULTI)"
      operationId: getText
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Text"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/texts/{id}/media/{mediaId}/file:
    get:
      tags:
      - Texts
      summary: Get text media file
      description: "Get an extra media file (TEXT_MULTI) attached to a text by specifying\
        \ the media file id and the variant (thumbnail, large, original). Returned\
        \ inline so browsers render it directly; Content-Type is derived from the\
        \ filename extension."
      operationId: getTextMediaFile
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: mediaId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: variant
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation
          content:
            '*/*': {}
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Problem"
                - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /{municipalityId}/texts/{id}/file:
    get:
      tags:
      - Texts
      summary: Get text file
      description: "Get a file associated with a text by specifying the variant (thumbnail,\
        \ large, text). Returned inline so browsers render it directly; Content-Type\
        \ is derived from the filename extension for thumbnail/large, and is text/html\
        \ for the text variant when the source is XML."
      operationId: getTextFile
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: variant
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation
          content:
            '*/*': {}
        "404":
          description: Not found
          content:
            application/problem+json:
